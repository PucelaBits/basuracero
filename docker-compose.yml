services:
  basuracero-app:
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    build:
      context: .
      args:
        - PORT=${PORT:-5050}
        - APP_GIT_SHA=${APP_GIT_SHA:-unknown}
        - APP_VERSION=${APP_VERSION:-unknown}
        - APP_UID=${DOCKER_UID:-1000}
        - APP_GID=${DOCKER_GID:-1000}
    ports:
      - "${PORT:-5050}:${PORT:-5050}"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - TZ=Europe/Madrid
      - PORT=${PORT:-5050}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - ADMIN_BOOTSTRAP_USERNAME=${ADMIN_BOOTSTRAP_USERNAME:-admin}
      - ADMIN_BOOTSTRAP_PASSWORD=${ADMIN_BOOTSTRAP_PASSWORD:-}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:' + process.env.PORT + '/api/incidencias/ultima-actualizacion', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
